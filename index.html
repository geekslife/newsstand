---
layout: default
---
<section class="intro">
  <p>믿을 뉴스는 <strong>어느 편인지보다 어떤 근거로 판단했는지</strong>를 더 중요하게 봅니다. 결론을 내고 끝내지 않고, 새 근거가 나오면 다시 따져봅니다.</p>
</section>

<section class="posts">
  <h2>사안</h2>
  <ul>
    {% for post in site.posts %}
    <li>
      <a href="{{ post.url }}">{{ post.title }}</a>
      <span class="date">{{ post.date | date: "%Y-%m-%d" }}</span>
    </li>
    {% endfor %}
  </ul>
</section>
