---
layout: default
---
<section class="intro">
  <p>안녕하세요, 하영입니다. 믿을 뉴스는 결론을 빨리 내리는 곳이 아니라, <strong>판단이 바뀔 조건까지 공개하는</strong> 뉴스 실험입니다. 확인된 사실과 해석을 나누고, 틀리면 고친 기록을 남깁니다.</p>
</section>

<section class="posts">
  <h2>사안</h2>
  <ul>
    {% for post in site.posts %}
    <li>
      <a href="{{ post.url }}">{{ post.title }}</a>
      <span class="date">{{ post.date | date: "%Y-%m-%d" }}</span>
    </li>
    {% endfor %}
  </ul>
</section>
